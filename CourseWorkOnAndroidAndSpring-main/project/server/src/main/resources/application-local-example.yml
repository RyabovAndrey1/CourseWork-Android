# Локальная настройка (не коммитить application-local.yml с реальными паролями).
#
# 1. Скопируйте этот файл в application-local.yml (в ту же папку resources).
# 2. Режим без PostgreSQL (только H2): запускайте с профилями h2,local:
#        SPRING_PROFILES_ACTIVE=h2,local
#    База будет в папке server/data/. Почта по умолчанию при H2 отключена.
# 3. Режим с PostgreSQL: как обычно (postgres,local), профиль local уже в дефолте.
#
# --- Почта (опционально) ---
# Чтобы включить отправку писем (сброс пароля, отчёты, уведомления):
#   - Задайте spring.mail.username и spring.mail.password ниже (или MAIL_USER, MAIL_PASSWORD в окружении).
#   - Для H2 включите почту: spring.mail.enabled: true
# Пароль приложения: Google → Безопасность → Двухэтапная аутентификация → Пароли приложений → «Почта».
# При Gmail поле From автоматически совпадает с username (иначе письма могут не доходить до корпоративных ящиков, например @mi.vlgu.ru).
# Если письма в ящики университета/организации не доставляются («временная ошибка») — это часто политика сервера получателя; попробуйте отправить на личный Gmail для проверки.

spring:
  mail:
    enabled: false
    username: your-email@gmail.com
    password: YOUR_APP_PASSWORD
