# Профиль postgres: использование PostgreSQL (как в задании и как у Загребина).
# Одна БД — все данные (преподаватели, предметы, оценки и т.д.) пишутся сразу в неё, без локального кэша и без синхронизации.
# Укажите: -Dspring.profiles.active=postgres или переменная SPRING_PROFILES_ACTIVE=postgres
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/student_performance}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
