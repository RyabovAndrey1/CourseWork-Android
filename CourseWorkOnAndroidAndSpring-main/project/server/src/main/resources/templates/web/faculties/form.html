<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle + ' — Учёт успеваемости'}">Факультет</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body>
    <header th:replace="~{web/fragments/layout :: header(activeSection=${activeSection})}"></header>
    <div th:replace="~{web/fragments/layout :: role-tabs(activeTab=${activeTab})}"></div>
    <div class="main-wrap">
        <h1 class="page-title" th:text="${pageTitle}">Факультет</h1>
        <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
        <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
        <div class="card">
            <form th:action="${faculty != null && faculty.facultyId != null} ? @{/web/faculties/edit/{id}(id=${faculty.facultyId})} : @{/web/faculties/create}" th:method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="name">Название</label>
                    <input id="name" name="name" type="text" required th:value="${faculty != null} ? ${faculty.name} : ''"/>
                </div>
                <div class="form-group">
                    <label for="deanName">Декан</label>
                    <input id="deanName" name="deanName" type="text" th:value="${faculty != null} ? ${faculty.deanName} : ''"/>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a th:href="@{/web/faculties}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
