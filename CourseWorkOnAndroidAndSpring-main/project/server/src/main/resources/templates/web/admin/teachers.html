<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle + ' — Учёт успеваемости'}">Преподаватели</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body>
    <header th:replace="~{web/fragments/layout :: header(activeSection=${activeSection})}"></header>
    <div th:replace="~{web/fragments/layout :: role-tabs(activeTab=${activeTab})}"></div>
    <div class="main-wrap">
        <h1 class="page-title" th:text="${pageTitle}">Преподаватели</h1>
        <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
        <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
        <p sec:authorize="hasAnyRole('ADMIN', 'DEANERY')">
            <a th:href="@{/web/admin/teachers/create}" class="btn btn-primary btn-sm">+ Добавить преподавателя</a>
        </p>
        <div class="card">
            <div class="data-table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ФИО</th>
                            <th>Логин</th>
                            <th>Email</th>
                            <th>Должность</th>
                            <th>Степень</th>
                            <th>Кафедра / Факультет</th>
                            <th sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="t : ${teachers}">
                            <td th:text="${t.fullName}">—</td>
                            <td th:text="${t.login}">—</td>
                            <td th:text="${t.email}">—</td>
                            <td th:text="${t.position != null ? t.position : '—'}">—</td>
                            <td th:text="${t.academicDegree != null ? t.academicDegree : '—'}">—</td>
                            <td th:text="${(t.departmentName != null ? t.departmentName : '') + (t.facultyName != null ? ' / ' + t.facultyName : '')}">—</td>
                            <td sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">
                                <a th:href="@{/web/admin/teachers/edit/{id}(id=${t.teacherId})}" class="btn-edit">Изменить</a>
                                <form th:action="@{/web/admin/teachers/delete/{id}(id=${t.teacherId})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-del" onclick="return confirm('Удалить запись преподавателя? Пользователь останется в системе.');">Удалить</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p th:if="${#lists.isEmpty(teachers)}" class="empty-state">Нет записей</p>
        </div>
    </div>
</body>
</html>
