<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle + ' — Учёт успеваемости'}">Группы</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body>
    <header th:replace="~{web/fragments/layout :: header(activeSection=${activeSection})}"></header>
    <div th:replace="~{web/fragments/layout :: role-tabs(activeTab=${activeTab})}"></div>
    <div class="main-wrap">
        <h1 class="page-title" th:text="${pageTitle}">Группы</h1>
        <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
        <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
        <form th:action="@{/web/groups}" method="get" class="form-inline">
            <input type="search" name="search" th:value="${search}" placeholder="Поиск по названию, специализации, факультету"/>
            <button type="submit" class="btn btn-secondary btn-sm">Искать</button>
            <a sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" th:href="@{/web/groups/create}" class="btn btn-primary btn-sm">+ Добавить группу</a>
        </form>
        <div class="card">
            <div class="data-table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Факультет</th>
                            <th class="num">Год набора</th>
                            <th>Специализация</th>
                            <th sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="g : ${groups}">
                            <td th:text="${g.groupId}">1</td>
                            <td th:text="${g.name}">—</td>
                            <td th:text="${g.faculty != null ? g.faculty.name : '—'}">—</td>
                            <td class="num" th:text="${g.admissionYear}">—</td>
                            <td th:text="${g.specialization != null ? g.specialization : '—'}">—</td>
                            <td sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">
                                <a th:href="@{/web/groups/edit/{id}(id=${g.groupId})}" class="btn-edit">Изменить</a>
                                <form th:action="@{/web/groups/delete/{id}(id=${g.groupId})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-del" onclick="return confirm('Удалить группу?');">Удалить</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p th:if="${#lists.isEmpty(groups)}" class="empty-state">Нет записей</p>
        </div>
    </div>
</body>
</html>
