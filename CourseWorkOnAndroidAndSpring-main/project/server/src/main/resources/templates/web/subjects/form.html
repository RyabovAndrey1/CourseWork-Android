<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle + ' — Учёт успеваемости'}">Дисциплина</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body>
    <header th:replace="~{web/fragments/layout :: header(activeSection=${activeSection})}"></header>
    <div th:replace="~{web/fragments/layout :: role-tabs(activeTab=${activeTab})}"></div>
    <div class="main-wrap">
        <h1 class="page-title" th:text="${pageTitle}">Дисциплина</h1>
        <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
        <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
        <div class="card">
            <form th:action="${subject != null && subject.subjectId != null} ? @{/web/subjects/edit/{id}(id=${subject.subjectId})} : @{/web/subjects/create}" th:method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="name">Название</label>
                    <input id="name" name="name" type="text" required th:value="${subject != null} ? ${subject.name} : ''"/>
                </div>
                <div class="form-group">
                    <label for="code">Код</label>
                    <input id="code" name="code" type="text" th:value="${subject != null} ? ${subject.code} : ''"/>
                </div>
                <div class="form-group">
                    <label for="credits">Кредиты</label>
                    <input id="credits" name="credits" type="number" step="0.1" th:value="${subject != null} ? ${subject.credits} : ''"/>
                </div>
                <div class="form-group">
                    <label for="totalHours">Всего часов</label>
                    <input id="totalHours" name="totalHours" type="number" th:value="${subject != null} ? ${subject.totalHours} : ''"/>
                </div>
                <div class="form-group">
                    <label for="controlType">Тип контроля</label>
                    <select id="controlType" name="controlType">
                        <option value="">—</option>
                        <option value="EXAM" th:selected="${subject != null && subject.controlType != null && subject.controlType.name() == 'EXAM'}">Экзамен</option>
                        <option value="CREDIT" th:selected="${subject != null && subject.controlType != null && subject.controlType.name() == 'CREDIT'}">Зачёт</option>
                        <option value="DIFF_CREDIT" th:selected="${subject != null && subject.controlType != null && subject.controlType.name() == 'DIFF_CREDIT'}">Диф. зачёт</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">Описание</label>
                    <textarea id="description" name="description" rows="3" th:text="${subject != null} ? ${subject.description} : ''"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a th:href="@{/web/subjects}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
