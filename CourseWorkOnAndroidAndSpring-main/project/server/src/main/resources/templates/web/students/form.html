<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle + ' — Учёт успеваемости'}">Студент</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body>
    <header th:replace="~{web/fragments/layout :: header(activeSection=${activeSection})}"></header>
    <div th:replace="~{web/fragments/layout :: role-tabs(activeTab=${activeTab})}"></div>
    <div class="main-wrap">
        <h1 class="page-title" th:text="${pageTitle}">Студент</h1>
        <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
        <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
        <div class="card">
            <form th:action="${student != null && student.studentId != null} ? @{/web/students/edit/{id}(id=${student.studentId})} : @{/web/students/create}" th:method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="login">Логин</label>
                    <input id="login" name="login" type="text" required th:value="${student != null && student.user != null} ? ${student.user.login} : ''"
                           th:readonly="${student != null && student.studentId != null}"/>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required th:value="${student != null && student.user != null} ? ${student.user.email} : ''"/>
                </div>
                <div class="form-group">
                    <label for="lastName">Фамилия</label>
                    <input id="lastName" name="lastName" type="text" required th:value="${student != null && student.user != null} ? ${student.user.lastName} : ''"/>
                </div>
                <div class="form-group">
                    <label for="firstName">Имя</label>
                    <input id="firstName" name="firstName" type="text" required th:value="${student != null && student.user != null} ? ${student.user.firstName} : ''"/>
                </div>
                <div class="form-group">
                    <label for="middleName">Отчество</label>
                    <input id="middleName" name="middleName" type="text" th:value="${student != null && student.user != null} ? ${student.user.middleName} : ''"/>
                </div>
                <div class="form-group">
                    <label for="groupId">Группа</label>
                    <select id="groupId" name="groupId">
                        <option value="">— не выбрана —</option>
                        <option th:each="g : ${groups}" th:value="${g.groupId}" th:text="${g.name}"
                                th:selected="${student != null && student.group != null && student.group.groupId == g.groupId}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="recordBookNumber">Номер зачётной книжки</label>
                    <input id="recordBookNumber" name="recordBookNumber" type="text" th:value="${student != null} ? ${student.recordBookNumber} : ''"/>
                </div>
                <div class="form-group">
                    <label for="admissionYear">Год поступления</label>
                    <input id="admissionYear" name="admissionYear" type="number" min="2000" max="2100" th:value="${student != null} ? ${student.admissionYear} : ''"/>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a th:href="@{/web/students}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
