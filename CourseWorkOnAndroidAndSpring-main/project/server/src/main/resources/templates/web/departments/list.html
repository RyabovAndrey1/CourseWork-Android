<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle + ' — Учёт успеваемости'}">Кафедры</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body>
    <header th:replace="~{web/fragments/layout :: header(activeSection=${activeSection})}"></header>
    <div th:replace="~{web/fragments/layout :: role-tabs(activeTab=${activeTab})}"></div>
    <div class="main-wrap">
        <h1 class="page-title" th:text="${pageTitle}">Кафедры</h1>
        <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
        <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
        <form th:action="@{/web/departments}" method="get" class="form-inline">
            <input type="search" name="search" th:value="${search}" placeholder="Поиск по названию, заведующему или факультету"/>
            <div class="form-group">
                <label for="facultyId">Факультет</label>
                <select id="facultyId" name="facultyId">
                    <option value="">— все —</option>
                    <option th:each="f : ${faculties}" th:value="${f.facultyId}" th:text="${f.name}" th:selected="${facultyId != null && facultyId == f.facultyId}"></option>
                </select>
            </div>
            <button type="submit" class="btn btn-secondary btn-sm">Искать</button>
            <a sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" th:href="@{/web/departments/create}" class="btn btn-primary btn-sm">+ Добавить кафедру</a>
        </form>
        <div class="card">
            <div class="data-table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Название</th>
                            <th>Факультет</th>
                            <th>Заведующий</th>
                            <th sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="d : ${departments}">
                            <td th:text="${d.name}">—</td>
                            <td th:text="${d.faculty != null ? d.faculty.name : '—'}">—</td>
                            <td th:text="${d.headName != null ? d.headName : '—'}">—</td>
                            <td sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">
                                <a th:href="@{/web/departments/edit/{id}(id=${d.departmentId})}" class="btn-edit">Изменить</a>
                                <form th:action="@{/web/departments/delete/{id}(id=${d.departmentId})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-del" onclick="return confirm('Удалить кафедру?');">Удалить</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p th:if="${#lists.isEmpty(departments)}" class="empty-state">Нет записей</p>
        </div>
    </div>
</body>
</html>
