<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle + ' — Учёт успеваемости'}">Дисциплины</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body>
    <header th:replace="~{web/fragments/layout :: header(activeSection=${activeSection})}"></header>
    <div th:replace="~{web/fragments/layout :: role-tabs(activeTab=${activeTab})}"></div>
    <div class="main-wrap">
        <h1 class="page-title" th:text="${pageTitle}">Дисциплины</h1>
        <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
        <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
        <form th:action="@{/web/subjects}" method="get" class="form-inline">
            <input type="search" name="search" th:value="${search}" placeholder="Поиск по названию или коду"/>
            <button type="submit" class="btn btn-secondary btn-sm">Искать</button>
            <a sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" th:href="@{/web/subjects/create}" class="btn btn-primary btn-sm">+ Добавить дисциплину</a>
        </form>
        <div class="card">
            <div class="data-table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Код</th>
                            <th class="num">Часы</th>
                            <th>Тип контроля</th>
                            <th sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${subjects}">
                            <td th:text="${s.subjectId}">1</td>
                            <td th:text="${s.name}">—</td>
                            <td th:text="${s.code != null ? s.code : '—'}">—</td>
                            <td class="num" th:text="${s.totalHours != null ? s.totalHours : '—'}">—</td>
                            <td th:text="${s.controlType != null ? s.controlType.name() : '—'}">—</td>
                            <td sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">
                                <a th:href="@{/web/subjects/edit/{id}(id=${s.subjectId})}" class="btn-edit">Изменить</a>
                                <form th:action="@{/web/subjects/delete/{id}(id=${s.subjectId})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-del" onclick="return confirm('Удалить дисциплину?');">Удалить</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p th:if="${#lists.isEmpty(subjects)}" class="empty-state">Нет записей</p>
        </div>
    </div>
</body>
</html>
