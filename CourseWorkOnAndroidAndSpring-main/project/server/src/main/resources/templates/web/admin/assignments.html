<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle + ' — Учёт успеваемости'}">Назначение преподавателя на дисциплину</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body>
    <header th:replace="~{web/fragments/layout :: header(activeSection=${activeSection})}"></header>
    <div th:replace="~{web/fragments/layout :: role-tabs(activeTab=${activeTab})}"></div>
    <div class="main-wrap">
        <h1 class="page-title" th:text="${pageTitle}">Назначение преподавателя на дисциплину</h1>
        <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
        <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
        <p class="text-muted">Назначьте преподавателя на дисциплину для группы (учебный год, семестр).</p>

        <div class="card" sec:authorize="hasAnyRole('ADMIN', 'DEANERY')">
            <h2>Добавить назначение</h2>
            <form th:action="@{/web/admin/assignments/create}" method="post" class="form-inline" style="display:flex; flex-wrap:wrap; gap:0.5rem; align-items:center;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <label>Преподаватель:
                    <select name="teacherId" required>
                        <option value="">— выберите —</option>
                        <option th:each="t : ${teachers}" th:value="${t.teacherId}" th:text="${t.fullName}">—</option>
                    </select>
                </label>
                <label>Группа:
                    <select name="groupId" required>
                        <option value="">— выберите —</option>
                        <option th:each="g : ${groups}" th:value="${g.groupId}" th:text="${g.name}">—</option>
                    </select>
                </label>
                <label>Дисциплина:
                    <select name="subjectId" required>
                        <option value="">— выберите —</option>
                        <option th:each="s : ${subjects}" th:value="${s.subjectId}" th:text="${s.name}">—</option>
                    </select>
                </label>
                <label>Учебный год: <input type="number" name="academicYear" th:value="${currentYear}" min="2000" max="2100" style="width:5rem;" required/></label>
                <label>Семестр: <input type="number" name="semester" value="1" min="1" max="12" style="width:3rem;" required/></label>
                <button type="submit" class="btn btn-primary btn-sm">Добавить</button>
            </form>
        </div>

        <div class="card">
            <h2>Текущие назначения</h2>
            <div class="data-table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Преподаватель</th>
                            <th>Группа</th>
                            <th>Дисциплина</th>
                            <th>Учебный год</th>
                            <th>Семестр</th>
                            <th sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a : ${assignments}">
                            <td th:text="${a.teacherName}">—</td>
                            <td th:text="${a.groupName}">—</td>
                            <td th:text="${a.subjectName}">—</td>
                            <td th:text="${a.academicYear}">—</td>
                            <td th:text="${a.semester}">—</td>
                            <td sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">
                                <form th:action="@{/web/admin/assignments/delete/{id}(id=${a.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-del" onclick="return confirm('Удалить это назначение?');">Удалить</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(assignments)}"><td colspan="6" class="empty-state">Нет назначений. Добавьте назначение выше.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
