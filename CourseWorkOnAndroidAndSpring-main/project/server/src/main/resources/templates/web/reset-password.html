<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Новый пароль — Учёт успеваемости</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body class="login-page">
    <div class="login-card">
        <h1>Установка нового пароля</h1>
        <p th:if="${error}" class="alert alert-error" th:text="${error}">Ошибка</p>
        <form th:if="${token}" th:action="@{/web/reset-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="token" th:value="${token}"/>
            <div class="form-group">
                <label for="newPassword">Новый пароль</label>
                <input id="newPassword" name="newPassword" type="password" required minlength="4" placeholder="Не менее 4 символов"/>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Повторите пароль</label>
                <input id="confirmPassword" name="confirmPassword" type="password" required minlength="4" placeholder="Повторите пароль"/>
            </div>
            <button type="submit">Сохранить пароль</button>
        </form>
        <p th:unless="${token}" class="alert alert-error">Недействительная или устаревшая ссылка. <a th:href="@{/web/forgot-password}">Запросите сброс снова</a>.</p>
        <p class="link-bottom"><a th:href="@{/web/login}">Вернуться к входу</a></p>
    </div>
</body>
</html>
