<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Смена пароля — Учёт успеваемости</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body class="login-page">
    <div class="login-card">
        <h1>Смена пароля</h1>
        <p th:if="${error}" class="alert alert-error" th:text="${error}">Ошибка</p>
        <form th:action="@{/web/change-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label for="login">Логин</label>
                <input id="login" name="login" type="text" required placeholder="Ваш логин"/>
            </div>
            <div class="form-group">
                <label for="oldPassword">Текущий пароль</label>
                <input id="oldPassword" name="oldPassword" type="password" required placeholder="Текущий пароль"/>
            </div>
            <div class="form-group">
                <label for="newPassword">Новый пароль</label>
                <input id="newPassword" name="newPassword" type="password" required minlength="6" placeholder="Новый пароль"/>
            </div>
            <button type="submit">Сменить пароль</button>
        </form>
        <p class="link-bottom"><a th:href="@{/web/login}">Вернуться к входу</a></p>
    </div>
</body>
</html>
