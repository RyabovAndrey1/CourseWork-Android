<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Вход — Учёт успеваемости</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body class="login-page">
    <div class="login-card">
        <h1>Вход в систему</h1>
        <p th:if="${error}" class="alert alert-error" th:text="${error}">Ошибка</p>
        <p th:if="${message}" class="alert alert-success" th:text="${message}">Сообщение</p>
        <form th:action="@{/web/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label for="username">Логин</label>
                <input id="username" name="username" type="text" required autocomplete="username" minlength="1" placeholder="Введите логин"/>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input id="password" name="password" type="password" required autocomplete="current-password" minlength="1" placeholder="Введите пароль"/>
            </div>
            <button type="submit">Войти</button>
        </form>
        <p class="link-bottom">
            <a th:href="@{/web/forgot-password}">Забыли пароль?</a> &nbsp;|&nbsp; <a th:href="@{/web/change-password}">Сменить пароль</a>
        </p>
    </div>
</body>
</html>
