<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle + ' — Учёт успеваемости'}">Студенты</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body>
    <header th:replace="~{web/fragments/layout :: header(activeSection=${activeSection})}"></header>
    <div th:replace="~{web/fragments/layout :: role-tabs(activeTab=${activeTab})}"></div>
    <div class="main-wrap">
        <h1 class="page-title" th:text="${pageTitle}">Студенты</h1>
        <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
        <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
        <form th:action="@{/web/students}" method="get" class="form-inline">
            <input type="search" name="search" th:value="${search}" placeholder="Поиск по ФИО или логину"/>
            <button type="submit" class="btn btn-secondary btn-sm">Искать</button>
            <a sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" th:href="@{/web/students/create}" class="btn btn-primary btn-sm">+ Добавить студента</a>
        </form>
        <div class="card">
            <div class="data-table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ФИО</th>
                            <th>Логин</th>
                            <th>Группа</th>
                            <th>Факультет</th>
                            <th class="num">Год поступления</th>
                            <th sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${students}">
                            <td th:text="${s.fullName}">ФИО</td>
                            <td th:text="${s.login}">login</td>
                            <td th:text="${s.groupName != null ? s.groupName : '—'}">—</td>
                            <td th:text="${s.facultyName != null ? s.facultyName : '—'}">—</td>
                            <td class="num" th:text="${s.admissionYear != null ? s.admissionYear : '—'}">—</td>
                            <td sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">
                                <a th:href="@{/web/students/edit/{id}(id=${s.studentId})}" class="btn-edit">Изменить</a>
                                <form th:action="@{/web/students/delete/{id}(id=${s.studentId})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-del" onclick="return confirm('Удалить студента?');">Удалить</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p th:if="${#lists.isEmpty(students)}" class="empty-state">Нет записей</p>
        </div>
    </div>
</body>
</html>
