<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle + ' — Учёт успеваемости'}">Пользователи</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body>
    <header th:replace="~{web/fragments/layout :: header(activeSection=${activeSection})}"></header>
    <div th:replace="~{web/fragments/layout :: role-tabs(activeTab=${activeTab})}"></div>
    <div class="main-wrap">
        <h1 class="page-title" th:text="${pageTitle}">Пользователи</h1>
        <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
        <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
        <p><a th:href="@{/web/admin/users/create}" class="btn btn-primary btn-sm">+ Добавить пользователя</a></p>
        <div class="card">
            <div class="data-table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Логин</th>
                            <th>ФИО</th>
                            <th>Email</th>
                            <th>Роль</th>
                            <th>Активен</th>
                            <th class="actions">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.userId}">1</td>
                            <td th:text="${u.login}">—</td>
                            <td><span th:text="${u.lastName}"></span> <span th:text="${u.firstName}"></span> <span th:text="${u.middleName}">—</span></td>
                            <td th:text="${u.email}">—</td>
                            <td th:text="${u.role}">—</td>
                            <td th:text="${u.isActive ? 'Да' : 'Нет'}">—</td>
                            <td class="actions">
                                <a th:href="@{/web/admin/users/edit/{id}(id=${u.userId})}" class="btn-edit">Изменить</a>
                                <form th:if="${u.isActive}" th:action="@{/web/admin/users/deactivate/{id}(id=${u.userId})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-del" onclick="return confirm('Деактивировать пользователя?');">Деактивировать</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p th:if="${#lists.isEmpty(users)}" class="empty-state">Нет записей</p>
        </div>
    </div>
</body>
</html>
