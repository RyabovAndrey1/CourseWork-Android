<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle + ' — Учёт успеваемости'}">Факультеты</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body>
    <header th:replace="~{web/fragments/layout :: header(activeSection=${activeSection})}"></header>
    <div th:replace="~{web/fragments/layout :: role-tabs(activeTab=${activeTab})}"></div>
    <div class="main-wrap">
        <h1 class="page-title" th:text="${pageTitle}">Факультеты</h1>
        <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
        <p th:if="${error}" class="alert alert-error" th:text="${error}"></p>
        <form th:action="@{/web/faculties}" method="get" class="form-inline">
            <input type="search" name="search" th:value="${search}" placeholder="Поиск по названию или декану"/>
            <button type="submit" class="btn btn-secondary btn-sm">Искать</button>
            <a sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" th:href="@{/web/faculties/create}" class="btn btn-primary btn-sm">+ Добавить факультет</a>
        </form>
        <div class="card">
            <div class="data-table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Декан</th>
                            <th sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="f : ${faculties}">
                            <td th:text="${f.facultyId}">1</td>
                            <td th:text="${f.name}">—</td>
                            <td th:text="${f.deanName != null ? f.deanName : '—'}">—</td>
                            <td sec:authorize="hasAnyRole('ADMIN', 'DEANERY')" class="actions">
                                <a th:href="@{/web/faculties/edit/{id}(id=${f.facultyId})}" class="btn-edit">Изменить</a>
                                <form th:action="@{/web/faculties/delete/{id}(id=${f.facultyId})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn-del" onclick="return confirm('Удалить факультет?');">Удалить</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p th:if="${#lists.isEmpty(faculties)}" class="empty-state">Нет записей</p>
        </div>
    </div>
</body>
</html>
