<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Восстановление пароля — Учёт успеваемости</title>
    <link rel="stylesheet" th:href="@{/css/web.css}"/>
</head>
<body class="login-page">
    <div class="login-card">
        <h1>Забыли пароль?</h1>
        <p class="text-muted">Введите адрес электронной почты, указанный при регистрации. Мы отправим вам ссылку для сброса пароля.</p>
        <p th:if="${error}" class="alert alert-error" th:text="${error}">Ошибка</p>
        <form th:action="@{/web/forgot-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required placeholder="example@mail.ru"/>
            </div>
            <button type="submit">Отправить ссылку</button>
        </form>
        <p class="link-bottom"><a th:href="@{/web/login}">Вернуться к входу</a></p>
    </div>
</body>
</html>
