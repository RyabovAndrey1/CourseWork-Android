media:
  path: ${MEDIA_PATH:${user.dir}/MEDIA}
  public-url-prefix: ${MEDIA_PUBLIC_PREFIX:/media}

server:
  address: 0.0.0.0
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
    session:
      timeout: 30m

# По умолчанию — PostgreSQL (база student_performance, пользователь postgres). Для H2: SPRING_PROFILES_ACTIVE=h2
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:postgres,local}
  mvc:
    # Иначе запросы без совпадения контроллера уходят в обработчик статики → "No static resource"
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/student_performance}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Переподключаться до того, как PostgreSQL закроет idle-соединение (избегаем "Connection reset by peer" при старте)
      max-lifetime: 600000
      connection-timeout: 20000
      initialization-fail-timeout: 60000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Почта (отправитель = твой Gmail, тот же что у админа).
  # Задай MAIL_USER=твой@gmail.com и MAIL_PASSWORD=пароль приложения Google.
  # Пароль приложения: Google Аккаунт → Безопасность → Пароли приложений (включи 2-Step Verification, затем создай пароль для «Почта»).
  # Проверка отправки (под админом): /api/web/admin/test-email
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:ghost.witcher22@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com

# Включить отправку писем. По умолчанию true; при заданном spring.mail.host письма отправляются.
spring.mail.enabled: ${MAIL_ENABLED:true}

jwt:
  secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1Zm9yLWp3dC10b2tlbnMtc3R1ZGVudC1wZXJmb3JtYW5jZQ==}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# Адрес отправителя (From). Если не задан — используется spring.mail.username (твой Gmail).
app.mail.from: ${MAIL_FROM:}

# FCM (Firebase Cloud Messaging) для пуш-уведомлений. Если не задан — пуши не отправляются.
# Ключ сервера: Firebase Console → Project Settings → Cloud Messaging → Server key (Legacy).
app.fcm.server-key: ${FCM_SERVER_KEY:}

logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.SQL: DEBUG
    ru.ryabov.studentperformance: DEBUG
    AUDIT: INFO
  file:
    name: ${LOG_PATH:logs/student-performance.log}
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
