# Профиль H2: файловая БД без PostgreSQL (данные в папке data/ между перезапусками).
# Запуск: SPRING_PROFILES_ACTIVE=h2 или -Dspring.profiles.active=h2
# Для почты: добавьте профиль local и настройте application-local.yml (см. application-local-example.yml).
spring:
  mail:
    enabled: false
  datasource:
    url: jdbc:h2:file:./data/studentperf;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  flyway:
    enabled: false
  sql:
    init:
      mode: never
